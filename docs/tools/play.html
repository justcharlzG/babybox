        function pickLocation(mode) {
            const displayPlace = document.getElementById('result-place');
            const displayTitle = document.getElementById('result-title');
            const displayType = document.getElementById('result-type');
            const displayActivities = document.getElementById('result-activities');
            const activityBox = document.getElementById('activity-box');
            const amapBtn = document.getElementById('amap-btn');
            
            let region = "";
            let place = "";
            let activities = "";

            // 1. 区域逻辑
            if (mode === 'today') {
                const regions = ["小区周边", "苏州市内"];
                region = regions[Math.floor(Math.random() * regions.length)];
                displayTitle.innerText = "🏃 今日推荐";
            } else {
                const regions = Object.keys(locationPool);
                region = regions[Math.floor(Math.random() * regions.length)];
                displayTitle.innerText = "🚀 周末推荐";
            }

            // 2. 抽取逻辑
            if (region === "外地(江浙)") {
                const provinces = Object.keys(locationPool[region]);
                const prov = provinces[Math.floor(Math.random() * provinces.length)];
                place = locationPool[region][prov][Math.floor(Math.random() * locationPool[region][prov].length)];
                activities = "跨城旅行，建议提前查好攻略和天气。";
            } else {
                const places = Object.keys(locationPool[region]);
                place = places[Math.floor(Math.random() * places.length)];
                activities = locationPool[region][place];
            }

            // 3. 更新UI
            currentPlace = place;
            displayPlace.innerText = place;
            displayType.innerText = region;
            displayActivities.innerText = activities;
            
            // 4. 显示控制与动画
            activityBox.classList.remove('hidden');
            amapBtn.classList.remove('hidden');
            
            // 重置动画
            displayPlace.classList.remove('animate-fadeIn');
            activityBox.classList.remove('animate-fadeIn');
            void displayPlace.offsetWidth; 
            displayPlace.classList.add('animate-fadeIn');
            activityBox.classList.add('animate-fadeIn');
        }

        function openAMap() {
            if (!currentPlace || currentPlace === "---") return;

            // 使用高德官方通用 URI 协议 (支持自动唤起 App)
            // 加上 t=0 代表地图标注模式，方便导航
            const amapUrl = `https://uri.amap.com/search?keyword=${encodeURIComponent(currentPlace)}&center=120.619585,31.299379&view=map&src=mypage&coordinate=gaode&callnative=1`;

            // 在微信中处理：提示用户
            if (/MicroMessenger/i.test(navigator.userAgent)) {
                alert("微信内无法直接唤起地图，请点击右上角选择“在浏览器中打开”即可一键导航。");
            } else {
                // 在普通浏览器中，直接跳转，高德协议会自动识别并询问是否打开 App
                window.location.href = amapUrl;
            }
        }
    </script>
</body>
</html>

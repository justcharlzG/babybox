<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>儿童饮食</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-orange-50 p-6 font-sans text-slate-800 min-h-screen">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-black text-orange-600 mb-8 flex items-center gap-3">
            <span>🍲</span> 儿童健康饮食指南
        </h1>
        
        <div class="bg-white rounded-2xl shadow-sm border border-orange-100 p-6 mb-6">
            <h2 class="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                <span class="w-2 h-6 bg-orange-400 rounded-full"></span>
                早餐推荐 (Breakfast)
            </h2>
            <ul class="space-y-3 text-slate-600">
                <li class="flex items-start gap-2">
                    <span class="text-orange-400 mt-1">●</span>
                    <span><strong>燕麦牛奶粥 + 水煮蛋 + 苹果片：</strong> 补充优质蛋白和膳食纤维，饱腹感强。</span>
                </li>
                <li class="flex items-start gap-2">
                    <span class="text-orange-400 mt-1">●</span>
                    <span><strong>全麦面包 + 花生酱 + 香蕉：</strong> 快速准备，提供充足能量。</span>
                </li>
            </ul>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-orange-100 p-6 mb-6">
            <h2 class="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                <span class="w-2 h-6 bg-green-400 rounded-full"></span>
                午餐推荐 (Lunch)
            </h2>
            <ul class="space-y-3 text-slate-600">
                <li class="flex items-start gap-2">
                    <span class="text-green-500 mt-1">●</span>
                    <span><strong>番茄炒蛋 + 糙米饭 + 清炒菠菜：</strong> 维生素C与铁元素的完美搭配。</span>
                </li>
                <li class="flex items-start gap-2">
                    <span class="text-green-500 mt-1">●</span>
                    <span><strong>清蒸鲈鱼 + 杂粮饭 + 凉拌黄瓜：</strong> 补充DHA，促进大脑发育。</span>
                </li>
            </ul>
        </div>
        
        <div class="bg-white rounded-2xl shadow-sm border border-orange-100 p-6">
            <h2 class="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                <span class="w-2 h-6 bg-blue-400 rounded-full"></span>
                晚餐推荐 (Dinner)
            </h2>
            <ul class="space-y-3 text-slate-600">
                <li class="flex items-start gap-2">
                    <span class="text-blue-500 mt-1">●</span>
                    <span><strong>鲜虾蔬菜面：</strong> 易消化，营养均衡。</span>
                </li>
                <li class="flex items-start gap-2">
                    <span class="text-blue-500 mt-1">●</span>
                    <span><strong>小米粥 + 蒸南瓜 + 瘦肉炒木耳：</strong> 养胃安神，有助于夜间睡眠。</span>
                </li>
            </ul>
        </div>
    </div>
</body>
</html>
